    <!-- 主要内容 -->
    <div class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 30px;">用户登录</h2>
            
            <form action="#" method="post">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div>
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember" style="display: inline;">记住我</label>
                    </div>
                    
                    <a href="#" style="color: #1e63b8; font-size: 14px;">忘记密码？</a>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">登录</button>
            </form>
            
            <div style="margin-top: 20px; text-align: center;">
                <p>还没有账号？<a href="register.html" style="color: #1e63b8;">立即注册</a></p>
            </div>
            
            <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                <p style="text-align: center; margin-bottom: 15px; color: #666;">其他登录方式</p>
                <div style="display: flex; justify-content: center; gap: 30px;">
                    <a href="#" style="text-align: center; color: #333; text-decoration: none;">
                        <div style="width: 40px; height: 40px; background: #f5f5f5; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 5px;">W</div>

                    </a>
                    
                    <a href="#" style="text-align: center; color: #333; text-decoration: none;">

                        <span style="font-size: 12px;">QQ</span>
                    </a>
                    
                    <a href="#" style="text-align: center; color: #333; text-decoration: none;">
